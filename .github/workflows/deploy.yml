name: Deploy to Production

on:
  push:
    branches: [main, prod/v2]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on Azure VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            REPO_DIR=/home/dit/bibliotheque-dit

            # Clone si première fois, sinon pull
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://github.com/hamdilawo/bibliotheque-dit.git $REPO_DIR
            fi

            cd $REPO_DIR
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}

            # Rebuild et restart en mode prod
            docker compose --profile prod up --build -d --remove-orphans

            # Reload Caddy pour prendre en compte les nouvelles routes
            sudo caddy reload --config $REPO_DIR/Caddyfile

            # Nettoyage images inutilisées
            docker image prune -f

            # Vérification des services (retry 12x toutes les 10s = 2 min max)
            echo "==> Vérification des services..."
            BASE=https://dit-librairy-api.francecentral.cloudapp.azure.com

            wait_for() {
              URL=$1
              EXPECTED=$2
              for i in $(seq 1 12); do
                STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
                if [ "$STATUS" = "$EXPECTED" ]; then
                  echo "  OK  $URL → $STATUS"
                  return 0
                fi
                echo "  ... $URL → $STATUS (attendu $EXPECTED), tentative $i/12"
                sleep 10
              done
              echo "  KO  $URL → toujours $STATUS après 2 minutes."
              exit 1
            }

            wait_for "$BASE/api/users/"     401
            wait_for "$BASE/api/livres/"    200
            wait_for "$BASE/api/emprunts/"  401
            wait_for "$BASE/health"         200
            echo "==> Tous les services répondent."

            # Attendre que le modèle soit entraîné (max 3 min)
            echo "==> Attente du modèle ML..."
            for i in $(seq 1 18); do
              MODELE=$(curl -s "$BASE/health" | grep -o '"modele_charge":true' || true)
              if [ -n "$MODELE" ]; then
                echo "  OK  Modèle ML chargé et prêt."
                break
              fi
              echo "  ... tentative $i/18 — modèle pas encore prêt"
              sleep 10
            done
            if [ -z "$MODELE" ]; then
              echo "  KO  Modèle ML non chargé après 3 minutes."
              exit 1
            fi
