# docker-compose.yml — Bibliothèque Numérique DIT

name: bibliotheque-dit

services:
  # ========== Livres =======
  book-db:
    image: postgres:16-alpine
    container_name: book-dit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_MULTIPLE_DATABASES: livres_db,utilisateurs_db,emprunts_db
    volumes:
      - book-postgres-data:/var/lib/postgresql/data
    ports:
      - "25434:5432"
    networks:
      - bibliotheque-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  book-api:
    container_name: dit-livres
    build:
      context: ./services/livres
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./services/livres/.env

    command: sh entrypoint.sh

    ports:
      - "8003:8001"
    depends_on:
      book-db:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - bibliotheque-network
    profiles: ["dev"]

  # ========== Users =======

  users-db:
    image: postgres:16-alpine
    container_name: dit-users-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    volumes:
      - users-postgres-data:/var/lib/postgresql/data
    ports:
      - "${PORT:-25433}:5432"
    networks:
      - bibliotheque-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    profiles: ["dev"]

  users:
    container_name: dit-utilisateurs
    build:
      context: ./services/utilisateurs
      dockerfile: Dockerfile
    entrypoint: ["/entrypoint.sh"]
    restart: unless-stopped
    env_file:
      - .env
      - ./services/utilisateurs/.env
    volumes:
      - ./services/utilisateurs:/app
    command: sh -c "python manage.py runserver 0.0.0.0:8002"
    ports:
      - "8002:8002"
    depends_on:
      users-db:
        condition: service_healthy
    networks:
      - bibliotheque-network
    profiles: ["dev"]

  # ========== End Users =======

  # recommandation:
  #   container_name: dit-recommandation
  #   build:
  #     context: ./services/recommandation
  #     dockerfile: Dockerfile
  #   restart: unless-stopped
  #   environment:
  #     SERVICE_LIVRES_URL: http://livres:8001
  #     SERVICE_EMPRUNTS_URL: http://emprunts:8003
  #     MODEL_PATH: /app/model/model.pkl
  #     DATA_PATH: /app/data/loans.csv
  #   volumes:
  #     - ./services/recommandation:/app
  #     - model-data:/app/model
  #     - training-data:/app/data
  #   command: uvicorn app.main:app --host 0.0.0.0 --port 8004 --reload
  #   ports:
  #     - "8004:8004"
  #   networks:
  #     - bibliotheque-network
  #   profiles: ["dev"]

  # frontend:
  #   container_name: dit-frontend
  #   build:
  #     context: ./services/frontend
  #     dockerfile: Dockerfile
  #   restart: unless-stopped
  #   environment:
  #     REACT_APP_LIVRES_URL: http://localhost:8001
  #     REACT_APP_USERS_URL: http://localhost:8002
  #     REACT_APP_EMPRUNTS_URL: http://localhost:8003
  #     REACT_APP_RECO_URL: http://localhost:8004
  #     CHOKIDAR_USEPOLLING: "true"
  #   volumes:
  #     - ./services/frontend/src:/app/src
  #     - ./services/frontend/public:/app/public
  #     - /app/node_modules
  #   command: npm start
  #   ports:
  #     - "3000:3000"
  #   networks:
  #     - bibliotheque-network
  #   profiles: ["dev"]

  # =================== Emprunt =====================

  loans-db:
    image: postgres:16-alpine
    container_name: dit-loans-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    volumes:
      - loans-postgres-data:/var/lib/postgresql/data
    ports:
      - "${PORT:-25432}:5432"
    networks:
      - bibliotheque-loans-service-network
      - bibliotheque-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    profiles: ["dev", "loans"]

  loans-api:
    build:
      context: ./emprunts
      dockerfile: Dockerfile
    entrypoint: ["/entrypoint.sh"]
    command: ["uv", "run", "python", "manage.py", "runserver", "0.0.0.0:8000"]
    env_file:
      - ./emprunts/.env.prod
      - .env
    container_name: dit-loans-service
    restart: unless-stopped
    ports:
      - "${PORT:-8008}:8000"
    networks:
      - bibliotheque-loans-service-network
      - bibliotheque-network

    depends_on:
      loans-db:
        condition: service_healthy

    profiles: ["dev", "loans"]

  # ==================== End Emprunt ================

  #------------------------------------------------------------------------------
  # MINIO - Stockage d'objets (couvertures livres, photos utilisateurs, exports ML)
  #------------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: dit-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9091"
    ports:
      - "9090:9000" # API S3 — utilisée depuis l'extérieur
      - "9091:9091" # Console d'administration web
    networks:
      - bibliotheque-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Initialisation des buckets MinIO (one-shot) ───────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: dit-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - bibliotheque-network
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
        mc mb --ignore-existing local/couvertures;
        mc mb --ignore-existing local/photos-utilisateurs;
        mc mb --ignore-existing local/exports-ml;
        mc anonymous set download local/couvertures;
        echo 'Buckets MinIO initialisés.';
      "

volumes:
  loans-postgres-data:
    name: loans-postgres-data
  postgres-data:
    name: dit-postgres-data
  model-data:
    name: dit-model-data
  training-data:
    name: dit-training-data
  minio-data:
    name: dit-minio-data

  users-postgres-data:
    name: users-postgres-data

  book-postgres-data:
    name: book-postgres-data

networks:
  bibliotheque-network:
    name: dit-network
    driver: bridge

  bibliotheque-loans-service-network:
    name: bibliotheque-loans-service-network
    driver: bridge
