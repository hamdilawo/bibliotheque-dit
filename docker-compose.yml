# docker-compose.yml — Bibliothèque Numérique DIT
# Profils disponibles :
#   dev  → docker compose --profile dev up
#   prod → docker compose --profile prod up

name: bibliotheque-dit

services:

  # ══════════════════════════════════════════════════════════════
  # Bases de données (toujours actives)
  # ══════════════════════════════════════════════════════════════

  book-db:
    image: postgres:16-alpine
    container_name: dit-book-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: livres_db
    volumes:
      - book-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d livres_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bibliotheque-network

  users-db:
    image: postgres:16-alpine
    container_name: dit-users-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: dit3
    volumes:
      - users-postgres-data:/var/lib/postgresql/data
    ports:
      - "25433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dit3"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bibliotheque-network

  loans-db:
    image: postgres:16-alpine
    container_name: dit-loans-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: emprunts_db
    volumes:
      - loans-postgres-data:/var/lib/postgresql/data
    ports:
      - "25432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d emprunts_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bibliotheque-network

  # ══════════════════════════════════════════════════════════════
  # MinIO — stockage objets (couvertures livres, exports ML)
  # ══════════════════════════════════════════════════════════════

  minio:
    image: minio/minio:latest
    container_name: dit-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9091"
    ports:
      - "9090:9000"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bibliotheque-network

  minio-init:
    image: minio/mc:latest
    container_name: dit-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - bibliotheque-network
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123;
        mc mb --ignore-existing local/couvertures;
        mc mb --ignore-existing local/photos-utilisateurs;
        mc mb --ignore-existing local/exports-ml;
        mc anonymous set download local/couvertures;
        echo 'Buckets MinIO initialisés.';
      "

  # ══════════════════════════════════════════════════════════════
  # Service Livres — Litestar / Piccolo / PostgreSQL
  # ══════════════════════════════════════════════════════════════

  livres-dev:
    container_name: book-api
    build:
      context: ./services/livres
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./services/livres/.env
    command: sh entrypoint.sh
    volumes:
      - ./services/livres:/app
    ports:
      - "8003:8001"
    depends_on:
      book-db:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - bibliotheque-network
    profiles: [dev]

  livres:
    container_name: book-api
    build:
      context: ./services/livres
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./services/livres/.env
    command: sh entrypoint.sh
    ports:
      - "8003:8001"
    depends_on:
      book-db:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - bibliotheque-network
    profiles: [prod]

  # ══════════════════════════════════════════════════════════════
  # Service Utilisateurs — Django REST Framework
  # ══════════════════════════════════════════════════════════════

  utilisateurs-dev:
    container_name: utilisateurs
    build:
      context: ./services/utilisateurs
      dockerfile: Dockerfile
    entrypoint: ["/entrypoint.sh"]
    restart: unless-stopped
    env_file:
      - ./services/utilisateurs/.env
    command: python manage.py runserver 0.0.0.0:8002
    volumes:
      - ./services/utilisateurs:/app
    ports:
      - "8002:8002"
    depends_on:
      users-db:
        condition: service_healthy
    networks:
      - bibliotheque-network
    profiles: [dev]

  utilisateurs:
    container_name: utilisateurs
    build:
      context: ./services/utilisateurs
      dockerfile: Dockerfile
    entrypoint: ["/entrypoint.sh"]
    restart: unless-stopped
    env_file:
      - ./services/utilisateurs/.env
    command: gunicorn utilisateurs_service.wsgi:application --bind 0.0.0.0:8002 --workers 3
    ports:
      - "8002:8002"
    depends_on:
      users-db:
        condition: service_healthy
    networks:
      - bibliotheque-network
    profiles: [prod]

  # ══════════════════════════════════════════════════════════════
  # Service Emprunts — Django (architecture hexagonale)
  # ══════════════════════════════════════════════════════════════

  emprunts-dev:
    container_name: loans-api
    build:
      context: ./services/emprunts
      dockerfile: Dockerfile
    entrypoint: ["/entrypoint.sh"]
    restart: unless-stopped
    env_file:
      - .env
      - ./services/emprunts/.env.prod
    environment:
      SEED_LOANS: "true"
    command: ["uv", "run", "python", "manage.py", "runserver", "0.0.0.0:8000"]
    volumes:
      - ./services/emprunts:/app
    ports:
      - "8008:8000"
    depends_on:
      loans-db:
        condition: service_healthy
    networks:
      - bibliotheque-network
    profiles: [dev]

  emprunts:
    container_name: loans-api
    build:
      context: ./services/emprunts
      dockerfile: Dockerfile
    entrypoint: ["/entrypoint.sh"]
    restart: unless-stopped
    env_file:
      - .env
      - ./services/emprunts/.env.prod
    environment:
      SEED_LOANS: "true"
    command: ["uv", "run", "gunicorn", "src.drf.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "3"]
    ports:
      - "8008:8000"
    depends_on:
      loans-db:
        condition: service_healthy
    networks:
      - bibliotheque-network
    profiles: [prod]

  # ══════════════════════════════════════════════════════════════
  # Service Recommandation — FastAPI + SVD (scikit-learn)
  # ══════════════════════════════════════════════════════════════

  recommandation-dev:
    container_name: recommandation
    build:
      context: ./services/recommandation
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SERVICE_LIVRES_URL: http://book-api:8001
      SERVICE_EMPRUNTS_URL: http://loans-api:8000
      MODEL_PATH: /app/model/model.pkl
      DATA_PATH: /app/data/loans.csv
      N_RECOMMENDATIONS: "5"
    volumes:
      - ./services/recommandation:/app
      - model-data:/app/model
      - training-data:/app/data
    ports:
      - "8004:8000"
    depends_on:
      - livres-dev
      - emprunts-dev
    networks:
      - bibliotheque-network
    profiles: [dev]

  recommandation:
    container_name: recommandation
    build:
      context: ./services/recommandation
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SERVICE_LIVRES_URL: http://book-api:8001
      SERVICE_EMPRUNTS_URL: http://loans-api:8000
      MODEL_PATH: /app/model/model.pkl
      DATA_PATH: /app/data/loans.csv
      N_RECOMMENDATIONS: "5"
    volumes:
      - model-data:/app/model
      - training-data:/app/data
    ports:
      - "8004:8000"
    depends_on:
      - livres
      - emprunts
    networks:
      - bibliotheque-network
    profiles: [prod]

  # ══════════════════════════════════════════════════════════════
  # Cron — Ré-entraînement automatique du modèle ML toutes les heures
  # ══════════════════════════════════════════════════════════════

  ml-cron:
    image: alpine:3.19
    container_name: dit-ml-cron
    restart: unless-stopped
    networks:
      - bibliotheque-network
    entrypoint: >
      /bin/sh -c "
        echo '0 * * * * wget -qO- --post-data=\"\" http://recommandation:8000/train > /proc/1/fd/1 2>&1' | crontab -
        crond -f -l 2
      "
    depends_on:
      - recommandation
    profiles: [prod]

  ml-cron-dev:
    image: alpine:3.19
    container_name: dit-ml-cron
    restart: unless-stopped
    networks:
      - bibliotheque-network
    entrypoint: >
      /bin/sh -c "
        echo '0 * * * * wget -qO- --post-data=\"\" http://recommandation:8000/train > /proc/1/fd/1 2>&1' | crontab -
        crond -f -l 2
      "
    depends_on:
      - recommandation-dev
    profiles: [dev]

  # ══════════════════════════════════════════════════════════════
  # Frontend — TanStack Start / React 19 / Tailwind v4 / Bun
  # ══════════════════════════════════════════════════════════════

  frontend-dev:
    container_name: dit-frontend
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
      target: deps
    restart: unless-stopped
    command: bun --bun vite dev --host 0.0.0.0 --port 3000
    volumes:
      - ./services/frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      VITE_APP_URL: http://localhost:3000
      VITE_APP_NAME: DIT Library
      VITE_USERS_API_URL: http://localhost:8002
      VITE_BOOKS_API_URL: http://localhost:8003
      VITE_LOANS_API_URL: http://localhost:8008
      VITE_RECOMMENDATION_API_URL: http://localhost:8004
    networks:
      - bibliotheque-network
    profiles: [dev]

  frontend:
    container_name: dit-frontend
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
      args:
        VITE_APP_URL: https://dit-librairy-api.francecentral.cloudapp.azure.com
        VITE_APP_NAME: DIT Library
        VITE_USERS_API_URL: https://dit-librairy-api.francecentral.cloudapp.azure.com
        VITE_BOOKS_API_URL: https://dit-librairy-api.francecentral.cloudapp.azure.com
        VITE_LOANS_API_URL: https://dit-librairy-api.francecentral.cloudapp.azure.com
        VITE_RECOMMENDATION_API_URL: https://dit-librairy-api.francecentral.cloudapp.azure.com
    ports:
      - "3000:3000"
    networks:
      - bibliotheque-network
    profiles: [prod]

# ══════════════════════════════════════════════════════════════
# Volumes nommés
# ══════════════════════════════════════════════════════════════

volumes:
  book-postgres-data:
    name: dit-book-postgres-data
  users-postgres-data:
    name: dit-users-postgres-data
  loans-postgres-data:
    name: dit-loans-postgres-data
  minio-data:
    name: dit-minio-data
  model-data:
    name: dit-model-data
  training-data:
    name: dit-training-data

# ══════════════════════════════════════════════════════════════
# Réseau dédié
# ══════════════════════════════════════════════════════════════

networks:
  bibliotheque-network:
    name: dit-bibliotheque-network
    driver: bridge
