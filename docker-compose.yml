# docker-compose.yml — Bibliothèque Numérique DIT

name: bibliotheque-dit

services:

  db:
    image: postgres:16-alpine
    container_name: dit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_MULTIPLE_DATABASES: livres_db,utilisateurs_db,emprunts_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh
    ports:
      - "5432:5432"
    networks:
      - bibliotheque-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  livres:
    container_name: dit-livres
    build:
      context: ./services/livres
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_NAME: livres_db
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      DB_HOST: db
      DB_PORT: 5432
      SECRET_KEY: ${SECRET_KEY:-changeme-secret-key-2026}
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
    volumes:
      - ./services/livres:/app
    command: >
      sh -c "python manage.py migrate &&
             python seed.py &&
             python manage.py runserver 0.0.0.0:8001"
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bibliotheque-network
    profiles: [ "dev" ]

  utilisateurs:
    container_name: dit-utilisateurs
    build:
      context: ./services/utilisateurs
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_NAME: utilisateurs_db
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      DB_HOST: db
      DB_PORT: 5432
      SECRET_KEY: ${SECRET_KEY:-changeme-secret-key-2026}
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
    volumes:
      - ./services/utilisateurs:/app
    command: >
      sh -c "python manage.py migrate &&
             python seed.py &&
             python manage.py runserver 0.0.0.0:8002"
    ports:
      - "8002:8002"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bibliotheque-network
    profiles: [ "dev" ]

  emprunts:
    container_name: dit-emprunts
    build:
      context: ./services/emprunts
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_NAME: emprunts_db
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      DB_HOST: db
      DB_PORT: 5432
      SECRET_KEY: ${SECRET_KEY:-changeme-secret-key-2026}
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      SERVICE_LIVRES_URL: http://livres:8001
      SERVICE_UTILISATEURS_URL: http://utilisateurs:8002
    volumes:
      - ./services/emprunts:/app
    command: >
      sh -c "python manage.py migrate &&
             python seed.py &&
             python manage.py runserver 0.0.0.0:8003"
    ports:
      - "8003:8003"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bibliotheque-network
    profiles: [ "dev" ]

  recommandation:
    container_name: dit-recommandation
    build:
      context: ./services/recommandation
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SERVICE_LIVRES_URL: http://livres:8001
      SERVICE_EMPRUNTS_URL: http://emprunts:8003
      MODEL_PATH: /app/model/model.pkl
      DATA_PATH: /app/data/loans.csv
    volumes:
      - ./services/recommandation:/app
      - model-data:/app/model
      - training-data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8004 --reload
    ports:
      - "8004:8004"
    networks:
      - bibliotheque-network
    profiles: [ "dev" ]

  frontend:
    container_name: dit-frontend
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      REACT_APP_LIVRES_URL: http://localhost:8001
      REACT_APP_USERS_URL: http://localhost:8002
      REACT_APP_EMPRUNTS_URL: http://localhost:8003
      REACT_APP_RECO_URL: http://localhost:8004
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./services/frontend/src:/app/src
      - ./services/frontend/public:/app/public
      - /app/node_modules
    command: npm start
    ports:
      - "3000:3000"
    networks:
      - bibliotheque-network
    profiles: [ "dev" ]

volumes:
  postgres-data:
    name: dit-postgres-data
  model-data:
    name: dit-model-data
  training-data:
    name: dit-training-data

networks:
  bibliotheque-network:
    name: dit-network
    driver: bridge
