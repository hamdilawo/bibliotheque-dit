# dvc.yaml
# Pipeline DVC — Bibliothèque Numérique DIT
# ==========================================
# Exécuter avec : dvc repro
# Visualiser    : dvc dag
# Métriques     : dvc metrics show

stages:

  # ── Étape 1 : Prétraitement ───────────────────────────────────────
  preprocess:
    cmd: python preprocess.py
    deps:
      - preprocess.py
      - data/loans.csv
    params:
      - params.yaml:
          - preprocess.score_min
          - preprocess.min_emprunts_utilisateur
          - preprocess.min_emprunts_livre
    outs:
      - data/loans_clean.csv
      - data/preprocess_stats.json

  # ── Étape 2 : Entraînement ────────────────────────────────────────
  train:
    cmd: python train.py
    deps:
      - train.py
      - data/loans_clean.csv
    params:
      - params.yaml:
          - train.algorithme
          - train.n_components
          - train.n_neighbors
    outs:
      - model/model.pkl
      - model/training_info.json

  # ── Étape 3 : Évaluation ──────────────────────────────────────────
  evaluate:
    cmd: python evaluate.py
    deps:
      - evaluate.py
      - data/loans_clean.csv
      - model/model.pkl
    params:
      - params.yaml:
          - evaluate.k
          - evaluate.test_size
    metrics:
      - metrics.json:
          cache: false
