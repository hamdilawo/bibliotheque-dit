# params.yaml
# Hyperparamètres versionnés par DVC
# Modifiez ces valeurs et relancez `dvc repro` pour comparer les expériences

train:
  # Algorithme principal : 'svd' ou 'knn'
  algorithme: svd

  # SVD : nombre de dimensions latentes
  # Plus élevé = plus précis mais plus lent
  # Note : avec 6 utilisateurs / 7 livres, le rang max de la matrice est 6.
  # Experiences :
  #   V1 : n_components=10 (sur-parametrise)
  #   V2 : n_components=2  (rang minimal, sous-parametrise)
  #   V3 : n_components=4  (point intermediaire, meilleur compromis attendu)
  n_components: 4

  # KNN : nombre de voisins similaires (utilise par le service reco, pas par DVC eval)
  n_neighbors: 5

  # Nombre de recommandations par défaut
  n_recommendations: 5

preprocess:
  # Score minimal pour conserver un emprunt
  score_min: 0.5

  # Nombre minimal d'emprunts par utilisateur
  min_emprunts_utilisateur: 1

  # Nombre minimal d'emprunts par livre
  min_emprunts_livre: 1

evaluate:
  # K pour Précision@K et Rappel@K
  k: 5

  # Proportion du jeu de test
  test_size: 0.2
