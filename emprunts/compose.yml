services:

  loans_db:
    image: postgres:16-alpine
    container_name: dit-loans-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_MULTIPLE_DATABASES: livres_db,utilisateurs_db,emprunts_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # - ./scripts/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh
    ports:
      - "25432:5432"
    networks:
      - bibliotheque-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    name: emprunts-postgres-data

networks:
  bibliotheque-network:
    name: dit-network
    driver: bridge
