services:

  db:
    image: postgres:16-alpine
    container_name: dit-loans-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "25432:5432"
    networks:
      - bibliotheque-loans-service-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    entrypoint: [ "/entrypoint.sh" ]
    command: [ "uv", "run", "python", "manage.py", "runserver", "0.0.0.0:8000" ]
    env_file:
      - .env.prod
    container_name: dit-loans-service
    restart: unless-stopped
    ports:
      - "8008:8000"
    networks:
      - bibliotheque-loans-service-network

    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
    name: emprunts-postgres-data

networks:
  bibliotheque-loans-service-network:
    driver: bridge
