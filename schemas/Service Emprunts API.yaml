openapi: 3.0.3
info:
  title: Service Emprunts API
  version: 1.0.0
  description: API de gestion des emprunts — Bibliothèque DIT
paths:
  /api/emprunts/:
    get:
      operationId: emprunts_list
      description: |-
        Gestion complète des emprunts.

        Endpoints :
        - POST   /api/emprunts/emprunter/          → emprunter un livre
        - POST   /api/emprunts/{id}/retourner/     → retourner un livre
        - GET    /api/emprunts/                    → liste de tous les emprunts
        - GET    /api/emprunts/{id}/               → détail d'un emprunt
        - GET    /api/emprunts/historique/         → historique par utilisateur
        - GET    /api/emprunts/retards/            → liste des retards
        - GET    /api/emprunts/export_csv/         → export pour le ML (DVC)
        - GET    /api/emprunts/statistiques/       → stats globales
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - emprunts
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEmpruntListList'
          description: ''
    post:
      operationId: emprunts_create
      description: |-
        Gestion complète des emprunts.

        Endpoints :
        - POST   /api/emprunts/emprunter/          → emprunter un livre
        - POST   /api/emprunts/{id}/retourner/     → retourner un livre
        - GET    /api/emprunts/                    → liste de tous les emprunts
        - GET    /api/emprunts/{id}/               → détail d'un emprunt
        - GET    /api/emprunts/historique/         → historique par utilisateur
        - GET    /api/emprunts/retards/            → liste des retards
        - GET    /api/emprunts/export_csv/         → export pour le ML (DVC)
        - GET    /api/emprunts/statistiques/       → stats globales
      tags:
      - emprunts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmpruntDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmpruntDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmpruntDetail'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpruntDetail'
          description: ''
  /api/emprunts/{id}/:
    get:
      operationId: emprunts_retrieve
      description: |-
        Gestion complète des emprunts.

        Endpoints :
        - POST   /api/emprunts/emprunter/          → emprunter un livre
        - POST   /api/emprunts/{id}/retourner/     → retourner un livre
        - GET    /api/emprunts/                    → liste de tous les emprunts
        - GET    /api/emprunts/{id}/               → détail d'un emprunt
        - GET    /api/emprunts/historique/         → historique par utilisateur
        - GET    /api/emprunts/retards/            → liste des retards
        - GET    /api/emprunts/export_csv/         → export pour le ML (DVC)
        - GET    /api/emprunts/statistiques/       → stats globales
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this emprunt.
        required: true
      tags:
      - emprunts
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpruntDetail'
          description: ''
    patch:
      operationId: emprunts_partial_update
      description: |-
        Gestion complète des emprunts.

        Endpoints :
        - POST   /api/emprunts/emprunter/          → emprunter un livre
        - POST   /api/emprunts/{id}/retourner/     → retourner un livre
        - GET    /api/emprunts/                    → liste de tous les emprunts
        - GET    /api/emprunts/{id}/               → détail d'un emprunt
        - GET    /api/emprunts/historique/         → historique par utilisateur
        - GET    /api/emprunts/retards/            → liste des retards
        - GET    /api/emprunts/export_csv/         → export pour le ML (DVC)
        - GET    /api/emprunts/statistiques/       → stats globales
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this emprunt.
        required: true
      tags:
      - emprunts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEmpruntDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEmpruntDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEmpruntDetail'
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpruntDetail'
          description: ''
    delete:
      operationId: emprunts_destroy
      description: |-
        Gestion complète des emprunts.

        Endpoints :
        - POST   /api/emprunts/emprunter/          → emprunter un livre
        - POST   /api/emprunts/{id}/retourner/     → retourner un livre
        - GET    /api/emprunts/                    → liste de tous les emprunts
        - GET    /api/emprunts/{id}/               → détail d'un emprunt
        - GET    /api/emprunts/historique/         → historique par utilisateur
        - GET    /api/emprunts/retards/            → liste des retards
        - GET    /api/emprunts/export_csv/         → export pour le ML (DVC)
        - GET    /api/emprunts/statistiques/       → stats globales
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this emprunt.
        required: true
      tags:
      - emprunts
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '204':
          description: No response body
  /api/emprunts/{id}/retourner/:
    post:
      operationId: emprunts_retourner_create
      description: |-
        POST /api/emprunts/{id}/retourner/
        Enregistre le retour, calcule les pénalités éventuelles,
        et met à jour les deux autres services.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this emprunt.
        required: true
      tags:
      - emprunts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetourEmprunt'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RetourEmprunt'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RetourEmprunt'
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpruntDetail'
          description: ''
  /api/emprunts/emprunter/:
    post:
      operationId: emprunts_emprunter_create
      description: |-
        POST /api/emprunts/emprunter/
        Vérifie la disponibilité du livre et le quota de l'utilisateur,
        puis crée l'emprunt en communicant avec les deux autres services.
      tags:
      - emprunts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreerEmprunt'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreerEmprunt'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreerEmprunt'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpruntDetail'
          description: ''
  /api/emprunts/export_csv/:
    get:
      operationId: emprunts_export_csv_retrieve
      description: |-
        GET /api/emprunts/export_csv/
        Exporte l'historique des emprunts en CSV pour le pipeline DVC.
        Colonnes : id, utilisateur_id, livre_id, date_emprunt,
                   date_retour_effective, statut, jours_retard
      tags:
      - emprunts
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpruntDetail'
          description: ''
  /api/emprunts/historique/:
    get:
      operationId: emprunts_historique_retrieve
      description: |-
        GET /api/emprunts/historique/?utilisateur_id=3
        Historique complet des emprunts d'un utilisateur.
      parameters:
      - in: query
        name: utilisateur_id
        schema:
          type: integer
        description: ID de l'utilisateur
      tags:
      - emprunts
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpruntDetail'
          description: ''
  /api/emprunts/retards/:
    get:
      operationId: emprunts_retards_retrieve
      description: |-
        GET /api/emprunts/retards/
        Liste des emprunts en retard avec mise à jour automatique des pénalités.
      tags:
      - emprunts
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpruntDetail'
          description: ''
  /api/emprunts/statistiques/:
    get:
      operationId: emprunts_statistiques_retrieve
      description: GET /api/emprunts/statistiques/
      tags:
      - emprunts
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpruntDetail'
          description: ''
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
