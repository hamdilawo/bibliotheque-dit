components:
  schemas:
    CreerEmprunt:
      type: object
      description: Serializer pour créer un emprunt.
      properties:
        utilisateur_id:
          type: integer
        livre_id:
          type: integer
        notes:
          type: string
      required:
      - livre_id
      - utilisateur_id
    EmpruntDetail:
      type: object
      description: Serializer complet.
      properties:
        id:
          type: integer
          readOnly: true
        est_en_retard:
          type: boolean
          readOnly: true
        jours_restants:
          type: integer
          readOnly: true
        utilisateur_id:
          type: integer
          maximum: 2147483647
          minimum: 0
        livre_id:
          type: integer
          maximum: 2147483647
          minimum: 0
        utilisateur_nom:
          type: string
          readOnly: true
        utilisateur_carte:
          type: string
          readOnly: true
        livre_titre:
          type: string
          readOnly: true
        livre_isbn:
          type: string
          readOnly: true
        livre_auteur:
          type: string
          readOnly: true
        date_emprunt:
          type: string
          format: date-time
          readOnly: true
        date_retour_prevue:
          type: string
          format: date
        date_retour_effective:
          type: string
          format: date
          nullable: true
        statut:
          allOf:
          - $ref: '#/components/schemas/StatutEnum'
          readOnly: true
        jours_retard:
          type: integer
          readOnly: true
        penalite_fcfa:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        notes:
          type: string
      required:
      - date_emprunt
      - date_retour_prevue
      - est_en_retard
      - id
      - jours_restants
      - jours_retard
      - livre_auteur
      - livre_id
      - livre_isbn
      - livre_titre
      - penalite_fcfa
      - statut
      - utilisateur_carte
      - utilisateur_id
      - utilisateur_nom
    EmpruntList:
      type: object
      description: Serializer allégé pour les listes.
      properties:
        id:
          type: integer
          readOnly: true
        utilisateur_id:
          type: integer
          maximum: 2147483647
          minimum: 0
        utilisateur_nom:
          type: string
          maxLength: 200
        utilisateur_carte:
          type: string
          maxLength: 20
        livre_id:
          type: integer
          maximum: 2147483647
          minimum: 0
        livre_titre:
          type: string
          maxLength: 255
        livre_auteur:
          type: string
          maxLength: 255
        livre_isbn:
          type: string
          maxLength: 13
        date_emprunt:
          type: string
          format: date-time
          readOnly: true
        date_retour_prevue:
          type: string
          format: date
        date_retour_effective:
          type: string
          format: date
          nullable: true
        statut:
          $ref: '#/components/schemas/StatutEnum'
        est_en_retard:
          type: boolean
          readOnly: true
        jours_restants:
          type: integer
          readOnly: true
        jours_retard:
          type: integer
          maximum: 2147483647
          minimum: 0
        penalite_fcfa:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      required:
      - date_emprunt
      - date_retour_prevue
      - est_en_retard
      - id
      - jours_restants
      - livre_id
      - utilisateur_id
    PaginatedEmpruntListList:
      type: object
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/EmpruntList'
    PatchedEmpruntDetail:
      type: object
      description: Serializer complet.
      properties:
        id:
          type: integer
          readOnly: true
        est_en_retard:
          type: boolean
          readOnly: true
        jours_restants:
          type: integer
          readOnly: true
        utilisateur_id:
          type: integer
          maximum: 2147483647
          minimum: 0
        livre_id:
          type: integer
          maximum: 2147483647
          minimum: 0
        utilisateur_nom:
          type: string
          readOnly: true
        utilisateur_carte:
          type: string
          readOnly: true
        livre_titre:
          type: string
          readOnly: true
        livre_isbn:
          type: string
          readOnly: true
        livre_auteur:
          type: string
          readOnly: true
        date_emprunt:
          type: string
          format: date-time
          readOnly: true
        date_retour_prevue:
          type: string
          format: date
        date_retour_effective:
          type: string
          format: date
          nullable: true
        statut:
          allOf:
          - $ref: '#/components/schemas/StatutEnum'
          readOnly: true
        jours_retard:
          type: integer
          readOnly: true
        penalite_fcfa:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        notes:
          type: string
    RetourEmprunt:
      type: object
      description: Serializer pour enregistrer un retour.
      properties:
        notes:
          type: string
    StatutEnum:
      enum:
      - EN_COURS
      - RETOURNE
      - EN_RETARD
      - PERDU
      type: string
      description: |-
        * `EN_COURS` - En cours
        * `RETOURNE` - Retourné
        * `EN_RETARD` - En retard
        * `PERDU` - Perdu
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
