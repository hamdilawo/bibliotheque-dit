  /api/utilisateurs/:
    get:
      operationId: utilisateurs_list
      description: |-
        Gestion complète des utilisateurs.

        Endpoints :
        - GET    /api/utilisateurs/              → liste paginée
        - POST   /api/utilisateurs/              → créer un utilisateur
        - GET    /api/utilisateurs/{id}/         → profil complet
        - PUT    /api/utilisateurs/{id}/         → modifier
        - PATCH  /api/utilisateurs/{id}/         → modification partielle
        - DELETE /api/utilisateurs/{id}/         → désactiver
        - GET    /api/utilisateurs/search/       → recherche
        - GET    /api/utilisateurs/par_type/     → filtrer par type
        - GET    /api/utilisateurs/{id}/profil_public/ → profil minimal (inter-services)
        - POST   /api/utilisateurs/{id}/sync_emprunts/ → sync compteur (inter-services)
        - GET    /api/utilisateurs/statistiques/ → stats globales
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - utilisateurs
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUtilisateurListList'
          description: ''
    post:
      operationId: utilisateurs_create
      description: |-
        Gestion complète des utilisateurs.

        Endpoints :
        - GET    /api/utilisateurs/              → liste paginée
        - POST   /api/utilisateurs/              → créer un utilisateur
        - GET    /api/utilisateurs/{id}/         → profil complet
        - PUT    /api/utilisateurs/{id}/         → modifier
        - PATCH  /api/utilisateurs/{id}/         → modification partielle
        - DELETE /api/utilisateurs/{id}/         → désactiver
        - GET    /api/utilisateurs/search/       → recherche
        - GET    /api/utilisateurs/par_type/     → filtrer par type
        - GET    /api/utilisateurs/{id}/profil_public/ → profil minimal (inter-services)
        - POST   /api/utilisateurs/{id}/sync_emprunts/ → sync compteur (inter-services)
        - GET    /api/utilisateurs/statistiques/ → stats globales
      tags:
      - utilisateurs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UtilisateurDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UtilisateurDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UtilisateurDetail'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UtilisateurDetail'
          description: ''
  /api/utilisateurs/{id}/:
    get:
      operationId: utilisateurs_retrieve
      description: |-
        Gestion complète des utilisateurs.

        Endpoints :
        - GET    /api/utilisateurs/              → liste paginée
        - POST   /api/utilisateurs/              → créer un utilisateur
        - GET    /api/utilisateurs/{id}/         → profil complet
        - PUT    /api/utilisateurs/{id}/         → modifier
        - PATCH  /api/utilisateurs/{id}/         → modification partielle
        - DELETE /api/utilisateurs/{id}/         → désactiver
        - GET    /api/utilisateurs/search/       → recherche
        - GET    /api/utilisateurs/par_type/     → filtrer par type
        - GET    /api/utilisateurs/{id}/profil_public/ → profil minimal (inter-services)
        - POST   /api/utilisateurs/{id}/sync_emprunts/ → sync compteur (inter-services)
        - GET    /api/utilisateurs/statistiques/ → stats globales
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this utilisateur.
        required: true
      tags:
      - utilisateurs
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UtilisateurDetail'
          description: ''
    put:
      operationId: utilisateurs_update
      description: |-
        Gestion complète des utilisateurs.

        Endpoints :
        - GET    /api/utilisateurs/              → liste paginée
        - POST   /api/utilisateurs/              → créer un utilisateur
        - GET    /api/utilisateurs/{id}/         → profil complet
        - PUT    /api/utilisateurs/{id}/         → modifier
        - PATCH  /api/utilisateurs/{id}/         → modification partielle
        - DELETE /api/utilisateurs/{id}/         → désactiver
        - GET    /api/utilisateurs/search/       → recherche
        - GET    /api/utilisateurs/par_type/     → filtrer par type
        - GET    /api/utilisateurs/{id}/profil_public/ → profil minimal (inter-services)
        - POST   /api/utilisateurs/{id}/sync_emprunts/ → sync compteur (inter-services)
        - GET    /api/utilisateurs/statistiques/ → stats globales
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this utilisateur.
        required: true
      tags:
      - utilisateurs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UtilisateurDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UtilisateurDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UtilisateurDetail'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UtilisateurDetail'
          description: ''
    patch:
      operationId: utilisateurs_partial_update
      description: |-
        Gestion complète des utilisateurs.

        Endpoints :
        - GET    /api/utilisateurs/              → liste paginée
        - POST   /api/utilisateurs/              → créer un utilisateur
        - GET    /api/utilisateurs/{id}/         → profil complet
        - PUT    /api/utilisateurs/{id}/         → modifier
        - PATCH  /api/utilisateurs/{id}/         → modification partielle
        - DELETE /api/utilisateurs/{id}/         → désactiver
        - GET    /api/utilisateurs/search/       → recherche
        - GET    /api/utilisateurs/par_type/     → filtrer par type
        - GET    /api/utilisateurs/{id}/profil_public/ → profil minimal (inter-services)
        - POST   /api/utilisateurs/{id}/sync_emprunts/ → sync compteur (inter-services)
        - GET    /api/utilisateurs/statistiques/ → stats globales
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this utilisateur.
        required: true
      tags:
      - utilisateurs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUtilisateurDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUtilisateurDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUtilisateurDetail'
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UtilisateurDetail'
          description: ''
    delete:
      operationId: utilisateurs_destroy
      description: 'Soft delete : désactive sans supprimer.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this utilisateur.
        required: true
      tags:
      - utilisateurs
      security:
      - jwtAuth: []
      - {}
      responses:
        '204':
          description: No response body
  /api/utilisateurs/{id}/profil_public/:
    get:
      operationId: utilisateurs_profil_public_retrieve
      description: |-
        Endpoint 7 — Profil public minimal (appelé par le service Emprunts).
        GET /api/utilisateurs/{id}/profil_public/
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this utilisateur.
        required: true
      tags:
      - utilisateurs
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfilPublic'
          description: ''
  /api/utilisateurs/{id}/sync_emprunts/:
    post:
      operationId: utilisateurs_sync_emprunts_create
      description: |-
        Endpoint 8 — Synchronisation du compteur d'emprunts (inter-services).
        POST /api/utilisateurs/{id}/sync_emprunts/
        Body: {"action": "incrementer"} ou {"action": "decrementer"}
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this utilisateur.
        required: true
      tags:
      - utilisateurs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmpruntSync'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmpruntSync'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmpruntSync'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UtilisateurDetail'
          description: ''
  /api/utilisateurs/par_type/:
    get:
      operationId: utilisateurs_par_type_retrieve
      description: |-
        Endpoint 6 — Lister les utilisateurs par type.
        GET /api/utilisateurs/par_type/?type=PROFESSEUR
      tags:
      - utilisateurs
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UtilisateurDetail'
          description: ''
  /api/utilisateurs/search/:
    get:
      operationId: utilisateurs_search_retrieve
      description: |-
        Endpoint 5 — Recherche avancée d'utilisateurs.
        GET /api/utilisateurs/search/?q=diallo&type=ETUDIANT
      parameters:
      - in: query
        name: q
        schema:
          type: string
        description: Nom, prénom, email ou numéro de carte
      - in: query
        name: statut
        schema:
          type: string
        description: ACTIF | SUSPENDU | INACTIF
      - in: query
        name: type
        schema:
          type: string
        description: ETUDIANT | PROFESSEUR | PERSONNEL | ADMIN
      tags:
      - utilisateurs
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UtilisateurDetail'
          description: ''
  /api/utilisateurs/statistiques/:
    get:
      operationId: utilisateurs_statistiques_retrieve
      description: |-
        Endpoint 9 — Statistiques globales des utilisateurs.
        GET /api/utilisateurs/statistiques/
      tags:
      - utilisateurs
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UtilisateurDetail'
          description: ''
components:
  schemas:
    ActionEnum:
      enum:
      - incrementer
      - decrementer
      type: string
      description: |-
        * `incrementer` - incrementer
        * `decrementer` - decrementer
    CustomTokenObtainPair:
      type: object
      description: JWT enrichi avec les infos utilisateur.
      properties:
        email:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    EmpruntSync:
      type: object
      description: |-
        Utilisé par le service Emprunts pour mettre à jour
        le compteur d'emprunts en cours.
      properties:
        action:
          $ref: '#/components/schemas/ActionEnum'
      required:
      - action
    PaginatedUtilisateurListList:
      type: object
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/UtilisateurList'
    PatchedUtilisateurDetail:
      type: object
      description: Serializer complet pour profil / création / modification.
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          maxLength: 254
        nom:
          type: string
          maxLength: 100
        prenom:
          type: string
          maxLength: 100
        nom_complet:
          type: string
          readOnly: true
        numero_carte:
          type: string
          description: Numéro de carte étudiant/employé
          maxLength: 20
        type_utilisateur:
          $ref: '#/components/schemas/TypeUtilisateurEnum'
        statut:
          $ref: '#/components/schemas/StatutEnum'
        telephone:
          type: string
          maxLength: 20
        adresse:
          type: string
        date_naissance:
          type: string
          format: date
          nullable: true
        quota_emprunts:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Nombre max de livres simultanés
        emprunts_en_cours:
          type: integer
          readOnly: true
        peut_emprunter:
          type: boolean
          readOnly: true
        date_inscription:
          type: string
          format: date-time
          readOnly: true
        date_modification:
          type: string
          format: date-time
          readOnly: true
        is_active:
          type: boolean
        password:
          type: string
          writeOnly: true
          minLength: 8
    ProfilPublic:
      type: object
      description: Profil public minimal (pour d'autres services).
      properties:
        id:
          type: integer
          readOnly: true
        nom_complet:
          type: string
          readOnly: true
        numero_carte:
          type: string
          description: Numéro de carte étudiant/employé
          maxLength: 20
        type_utilisateur:
          $ref: '#/components/schemas/TypeUtilisateurEnum'
        statut:
          $ref: '#/components/schemas/StatutEnum'
        quota_emprunts:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Nombre max de livres simultanés
        emprunts_en_cours:
          type: integer
          maximum: 2147483647
          minimum: 0
        peut_emprunter:
          type: string
          readOnly: true
      required:
      - id
      - nom_complet
      - numero_carte
      - peut_emprunter
    StatutEnum:
      enum:
      - ACTIF
      - SUSPENDU
      - INACTIF
      type: string
      description: |-
        * `ACTIF` - Actif
        * `SUSPENDU` - Suspendu
        * `INACTIF` - Inactif
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    TypeUtilisateurEnum:
      enum:
      - ETUDIANT
      - PROFESSEUR
      - PERSONNEL
      - ADMIN
      type: string
      description: |-
        * `ETUDIANT` - Étudiant
        * `PROFESSEUR` - Professeur
        * `PERSONNEL` - Personnel
        * `ADMIN` - Administrateur
    UtilisateurDetail:
      type: object
      description: Serializer complet pour profil / création / modification.
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          maxLength: 254
        nom:
          type: string
          maxLength: 100
        prenom:
          type: string
          maxLength: 100
        nom_complet:
          type: string
          readOnly: true
        numero_carte:
          type: string
          description: Numéro de carte étudiant/employé
          maxLength: 20
        type_utilisateur:
          $ref: '#/components/schemas/TypeUtilisateurEnum'
        statut:
          $ref: '#/components/schemas/StatutEnum'
        telephone:
          type: string
          maxLength: 20
        adresse:
          type: string
        date_naissance:
          type: string
          format: date
          nullable: true
        quota_emprunts:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Nombre max de livres simultanés
        emprunts_en_cours:
          type: integer
          readOnly: true
        peut_emprunter:
          type: boolean
          readOnly: true
        date_inscription:
          type: string
          format: date-time
          readOnly: true
        date_modification:
          type: string
          format: date-time
          readOnly: true
        is_active:
          type: boolean
        password:
          type: string
          writeOnly: true
          minLength: 8
      required:
      - date_inscription
      - date_modification
      - email
      - emprunts_en_cours
      - id
      - nom
      - nom_complet
      - numero_carte
      - peut_emprunter
      - prenom
    UtilisateurList:
      type: object
      description: Serializer allégé pour les listes.
      properties:
        id:
          type: integer
          readOnly: true
        nom_complet:
          type: string
          readOnly: true
        email:
          type: string
          format: email
          maxLength: 254
        numero_carte:
          type: string
          description: Numéro de carte étudiant/employé
          maxLength: 20
        type_utilisateur:
          $ref: '#/components/schemas/TypeUtilisateurEnum'
        statut:
          $ref: '#/components/schemas/StatutEnum'
        emprunts_en_cours:
          type: integer
          maximum: 2147483647
          minimum: 0
        quota_emprunts:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Nombre max de livres simultanés
        peut_emprunter:
          type: boolean
          readOnly: true
      required:
      - email
      - id
      - nom_complet
      - numero_carte
      - peut_emprunter
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
