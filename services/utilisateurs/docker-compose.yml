# Indique à Docker Compose quel format de fichier utiliser
# Chaque version supporte des fonctionnalités différentes
# Les nouvelles versions de Docker Compose
# n'ont plus besoin de la clé 'version'
# Si Docker Compose v2+ installé → supprimer version
# docker-compose --version
#version: '3.8'

services:
  # Service Django
  web:
    build: .
    container_name: utilisateurs_service
    command: python manage.py runserver 0.0.0.0:8002
    volumes:
      - .:/app
    ports:
      - "8002:8002"
    env_file:
      # chargé mais pas copié dans l'image,nécessaire pour Django
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - utilisateurs_network

  # Service PostgreSQL 16
  db:
    image: postgres:16-alpine
    container_name: utilisateurs_db
    # env_file supprimé — inutile ici
    #env_file:
    #- .env
    environment:
      POSTGRES_DB: ${DB_NAME} # lu directement depuis .env
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - utilisateurs_network

volumes:
  postgres_data:

networks:
  utilisateurs_network:
    driver: bridge
